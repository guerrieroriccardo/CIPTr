name: Release CLI
on:
  push:
    branches:
      - main
    paths:
      - 'cli/**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # On tag pushes, only run for major/minor bumps (vX.Y.0), not patch fixes.
    if: ${{ !startsWith(github.ref, 'refs/tags/') || endsWith(github.ref_name, '.0') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
